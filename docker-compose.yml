services:
  api:
    build: .
    image: taskflow:latest
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - taskflow-net

  redis:
    image: redis:7-alpine
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  taskflow-net:
    driver: bridge
